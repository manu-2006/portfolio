<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manu Kumar</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>

<!-- CURSOR -->
<div class="cursor"></div>

<!-- NAVBAR -->
<header>
  <h2>&lt;/&gt; Portfolio</h2>
  <nav>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <img src="profile.jpeg" class="profile">

  <h1>Manu Kumar</h1>
  <h3><span class="typing"></span></h3>

  <p>Machine Learning | Cybersecurity | Developer</p>

  <div class="buttons">
    <a href="#projects">View Projects</a>
    <a href="resume.pdf" download>Resume</a>
  </div>

  <div class="socials">
    <a href="https://github.com/manu-2006"><i class="fab fa-github"></i></a>
    <a href="#"><i class="fab fa-linkedin"></i></a>
  </div>
</section>

<section id="about" class="card reveal">
  <h2>About Me</h2>
  <p>BCA student building AI & cybersecurity solutions.</p>
</section>

<section id="projects" class="card reveal">
  <h2>Projects</h2>
  <div class="projects-grid" id="projects-container"></div>
</section>

<section id="contact" class="card reveal">
  <h2>Contact</h2>
  <form id="contact-form">
    <input type="text" name="name" placeholder="Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <textarea name="message" placeholder="Message"></textarea>
    <button type="submit">Send</button>
  </form>
</section>

<footer>
  <p>© Manu Kumar</p>
</footer>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span id="close">&times;</span>
    <h2 id="modal-title"></h2>
    <p id="modal-desc"></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script src="script.js"></script>

</body>
</html>
